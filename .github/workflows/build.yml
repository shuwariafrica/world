name: Integration Build

on:
  workflow_dispatch:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
    tags: [ v* ]

env:
  NODE_LTS: 22
  JDK_PUBLISH_LTS: 17
  SBT_OPTS: >- # Use all available resources
    -Xmx8G
    -Xss4M
    -XX:ReservedCodeCacheSize=512M

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: "[${{ matrix.platform }} / ${{ matrix.os }} / JDK ${{ matrix.java }}] Build & Test"
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: jvm,    project: world,       java: 17, os: ubuntu-26.04 }
          - { platform: jvm,    project: world,       java: 21, os: ubuntu-26.04 }
          - { platform: jvm,    project: world,       java: 25, os: ubuntu-26.04 }
          - { platform: js,     project: worldJS,     java: 21, os: ubuntu-26.04 }
          - { platform: native, project: worldNative, java: 21, os: ubuntu-26.04 }
          - { platform: native, project: worldNative, java: 21, os: windows-2025-vs2026 }
          - { platform: native, project: worldNative, java: 21, os: macos-26 }

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier Cache
        uses: coursier/cache-action@v8

      - name: Set up Node.js
        if: matrix.platform == 'js'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_LTS }}

      # vcvarsall imports the MSVC build environment for the target arch; LLVM_BIN points Scala Native's
      # discovery at MSVCs clang ensuring the correct ABI
      - name: Set up MSVC toolchain (Windows)
        if: startsWith(matrix.os, 'windows') && matrix.platform == 'native'
        shell: pwsh
        env:
          VSARCH: amd64
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
                  -latest -property installationPath
          cmd /c "`"$vs\VC\Auxiliary\Build\vcvarsall.bat`" $env:VSARCH && set" |
            ForEach-Object { if ($_ -match '^([^=]+)=(.*)$') { "$($Matches[1])=$($Matches[2])" } } |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $sub = if ($env:VSARCH -eq 'arm64') { 'arm64' } else { 'x64' }
          "LLVM_BIN=$vs\VC\Tools\Llvm\$sub\bin" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Execute Tests and Packaging
        shell: bash
        run: |
          sbt -Dsbt.ci=true "${{ matrix.project }}/test"
          sbt -Dsbt.ci=true "${{ matrix.project }}/publishLocal"

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_PUBLISH_LTS }}

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier Cache
        uses: coursier/cache-action@v8

      - name: Verify Formatting
        id: scalafmt-check
        run: sbt -Dsbt.ci=true scalafmtCheckAll
        continue-on-error: true

      - name: Verify Linting Conformance
        id: scalafix-check
        run: sbt -Dsbt.ci=true "scalafixAll --check"
        continue-on-error: true

      - name: Verify Source File Headers
        id: header-check
        run: sbt -Dsbt.ci=true headerCheckAll
        continue-on-error: true

      - name: Report Failures
        if: steps.scalafmt-check.outcome == 'failure' || steps.scalafix-check.outcome == 'failure' || steps.header-check.outcome == 'failure'
        run: |
          echo "Error: One or more static analysis tasks failed." >&2
          if [[ "${{ steps.scalafmt-check.outcome }}" == "failure" ]]; then
            echo "- Scalafmt code formatting check failed." >&2
          fi
          if [[ "${{ steps.scalafix-check.outcome }}" == "failure" ]]; then
            echo "- Scalafix code compliance check failed." >&2
          fi
          if [[ "${{ steps.header-check.outcome }}" == "failure" ]]; then
            echo "- Source file headers check failed." >&2
          fi
          exit 1

  site:
    name: Compile Documentation Site
    runs-on: ubuntu-26.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_PUBLISH_LTS }}

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier Cache
        uses: coursier/cache-action@v8

      - name: Build Site
        id: build-site
        run: sbt -Dsbt.ci=true "world-site/generateUnidoc"

      - name: Sanity check site
        run: test -s "${{ steps.build-site.outputs.site_dir }}/index.html"

      - name: Prepare Pages Artifact (.nojekyll)
        if: startsWith(github.ref, 'refs/tags/v')
        run: touch "${{ steps.build-site.outputs.site_dir }}/.nojekyll"

      - name: Upload Pages Artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ steps.build-site.outputs.site_dir }}

  publish:
    name: Publish Artefacts
    needs: [ build, static-analysis, site ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-26.04
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: 'Setup GPG Key and Agent'
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.OSS_PUBLISH_USER_SIGNING_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_PUBLISH_LTS }}
          check-latest: true

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Coursier Cache
        uses: coursier/cache-action@v8

      - name: Publish Release Artefacts (jvm/js/native)
        env:
          SONATYPE_USERNAME: ${{ secrets.OSS_PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.OSS_PUBLISH_USER_PASSPHRASE }}
        run: sbt -Dsbt.ci=true publishSigned sonaUpload sonaRelease

  site-release:
    name: Publish Site & GitHub Release
    needs: [ publish, site ]
    if: github.event_name != 'pull_request' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-26.04
    permissions:
      contents: write          # needed to create a release
      pages: write             # deploy to GitHub Pages
      id-token: write          # required by actions/deploy-pages
    environment:
      name: github-pages
      url: ${{ steps.deploy-pages.outputs.page_url }}
    steps:
      # Deploys the `github-pages` artefact uploaded by the `site` job
      # in this same run — no checkout/sbt/rebuild needed.
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deploy-pages
        uses: actions/deploy-pages@v5

      - name: Mint Release Bot Token
        id: release-bot
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ steps.release-bot.outputs.token }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $prerelease_flag
