rules = [
  DisableSyntax,
  OrganizeImports
]

DisableSyntax = {
  noVars = true
  noThrows = true
  noNulls = true
  noReturns = true
  noWhileLoops = true
  noAsInstanceOf = true
  noIsInstanceOf = true
  noXml = true
  noDefaultArgs = true
  noFinalize = true
  noValPatterns = true
}

OrganizeImports = {
  targetDialect = Scala3
  blankLines = Auto
  expandRelative = true
  groupedImports = Explode
  importSelectorsOrder = Ascii
  importsOrder = Ascii
  groups = [
    "*",
    "re:javax?\\.",
    "scala",
    "africa.shuwari",
    "africa.shuwari.locale",
    "africa.shuwari.money",
  ]

  removeUnused = true
}
